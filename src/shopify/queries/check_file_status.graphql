query FileStatusById($id: ID!) {
  node(id: $id) {
    __typename
    ... on File {
      id
      fileStatus
      createdAt
      fileErrors {
        code
        message
      }
    }
    ... on MediaImage {
      id
      fileStatus
      createdAt
    }
    ... on Video {
      id
      fileStatus
      createdAt
    }
    ... on GenericFile {
      id
      fileStatus
      createdAt
    }
  }
}